name: atenza_mobile
description: ATENZA — app móvil de estudiantes (E1 login/registro + E3 inscripciones)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  intl: ^0.19.0
  provider: ^6.1.0
  shared_preferences: ^2.3.0
  table_calendar: ^3.1.2
  socket_io_client: ^3.1.6
  flutter_windowmanager_plus: ^1.0.1
  wakelock_plus: ^1.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/isologo.png

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/isologo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/isologo.png"

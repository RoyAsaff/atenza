<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Atenza</title>
    <script>
      // GitHub Pages es un host estático puro (sin el "try_files" que usa
      // nginx en Coolify/Railway): cualquier ruta que React Router maneja
      // del lado del cliente (ej. /materias/5) le da 404 acá, porque no
      // existe ese archivo. Truco estándar (spa-github-pages): codifica
      // la ruta original en la query string y redirige a index.html, que
      // la decodifica en el <script> agregado en index.html.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>

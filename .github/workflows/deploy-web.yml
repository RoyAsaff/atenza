name: Deploy web a GitHub Pages

# El web/ es un sitio 100% estático (Vite) — GitHub Pages lo sirve gratis.
# Solo el backend (Node + Postgres + Socket.IO) necesita un servidor real.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Instalar dependencias
        working-directory: web
        run: npm ci
      - name: Build
        working-directory: web
        # VITE_API_URL: se define como "Repository variable" en GitHub
        # (Settings → Secrets and variables → Actions → Variables) — la
        # URL pública del backend (Railway, Coolify, etc).
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
